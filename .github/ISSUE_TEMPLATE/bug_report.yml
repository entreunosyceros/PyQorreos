name: Informe de error
description: Algo no funciona como debería
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un error en **PyQorreos**. Cuanta más información des, más fácil será reproducirlo.

        ⚠️ No incluyas contraseñas, tokens OAuth ni contenido privado de correos en este informe.

  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - Cuentas y conexión (IMAP/SMTP, OAuth)
        - Bandeja y sincronización
        - Lectura de mensajes (visor, adjuntos, traducción)
        - Redacción y envío
        - Carpetas IMAP
        - Interfaz / tema / bandeja del sistema
        - Instalación o arranque (run_app.py)
        - Otro
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión
      description: Versión de PyQorreos o commit si ejecutas desde código fuente
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Proveedor de correo (si aplica)
      options:
        - Gmail
        - Outlook / Hotmail
        - Yahoo
        - Servidor personalizado
        - No aplica / No lo sé
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista numerada de acciones hasta ver el fallo
      placeholder: |
        1. Abrir PyQorreos con `python run_app.py`
        2. Cuenta → Gestionar cuentas
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs o capturas
      description: Salida de terminal al ejecutar `python run_app.py`, traceback o capturas (sin datos personales)
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Entorno
      options:
        - Código fuente (`python run_app.py`)
        - Entorno virtual manual (`.venv`)
        - Linux (escritorio)
        - Windows
        - macOS
        - No lo sé
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Versión de Python
      placeholder: "3.12.x"

  - type: input
    id: desktop
    attributes:
      label: Entorno de escritorio (si aplica)
      placeholder: "GNOME, KDE, etc."

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmación
      options:
        - label: He buscado en issues abiertas y cerradas y no he encontrado un duplicado
          required: true
