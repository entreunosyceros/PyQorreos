name: Solicitud de mejora
description: Proponer una nueva función o mejora
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe el problema o la necesidad antes que la solución concreta. Así es más fácil valorar la propuesta para **PyQorreos**.

  - type: dropdown
    id: area
    attributes:
      label: Área
      options:
        - Cuentas y conexión (OAuth, varias cuentas)
        - Bandeja, sync y caché local
        - Lectura (visor HTML, traducción, anti-phishing)
        - Redacción, adjuntos y plantillas
        - Carpetas y organización IMAP
        - Clasificación (spam, importante, reglas)
        - Interfaz, tema y accesibilidad
        - Documentación
        - Instalación / empaquetado
        - Otro
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: ¿Qué problema o necesidad quieres resolver?
      placeholder: "Ej.: No puedo filtrar los correos por varios remitentes a la vez."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta (opcional)
      description: Cómo imaginas que debería funcionar en PyQorreos
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Alcance
      options:
        - label: Estoy dispuesto/a a contribuir con un PR si la propuesta encaja
          required: false
